spring.application.name=gateway-server
server.port=8080
server.address=0.0.0.0

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.server.webflux.routes[1].id=food-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://food-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/food-items/**

spring.cloud.gateway.server.webflux.routes[2].id=order-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://order-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.server.webflux.routes[3].id=payment-notif-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://payment-notif-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/payments/**,/api/notifications/**
