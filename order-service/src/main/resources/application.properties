spring.application.name=order-service
server.port=8083
server.address=0.0.0.0

eureka.client.enabled=${EUREKA_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# MariaDB Configuration
spring.datasource.url=jdbc:mariadb://localhost:3307/food-ordering
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

services.user.url=${USER_SERVICE_URL:http://localhost:8081}
services.food.url=${FOOD_SERVICE_URL:http://localhost:8082}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ========================
# Resilience4j Configuration
# ========================

# --- Circuit Breaker ---
# Circuit breaker cho orderService (createOrder, updateStatus)
resilience4j.circuitbreaker.instances.orderService.register-health-indicator=true
resilience4j.circuitbreaker.instances.orderService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.orderService.sliding-window-size=10
resilience4j.circuitbreaker.instances.orderService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.orderService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.orderService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.orderService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.orderService.automatic-transition-from-open-to-half-open-enabled=true

# Circuit breaker cho userService (fetchUser)
resilience4j.circuitbreaker.instances.userService.register-health-indicator=true
resilience4j.circuitbreaker.instances.userService.sliding-window-type=COUNT_BASED 
resilience4j.circuitbreaker.instances.userService.sliding-window-size=10
resilience4j.circuitbreaker.instances.userService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.userService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.userService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.userService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.userService.automatic-transition-from-open-to-half-open-enabled=true

# Circuit breaker cho foodService (fetchFood)
resilience4j.circuitbreaker.instances.foodService.register-health-indicator=true
resilience4j.circuitbreaker.instances.foodService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.foodService.sliding-window-size=10
resilience4j.circuitbreaker.instances.foodService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.foodService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.foodService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.foodService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.foodService.automatic-transition-from-open-to-half-open-enabled=true

# --- Retry ---
# Retry cho orderService
resilience4j.retry.instances.orderService.max-attempts=3
resilience4j.retry.instances.orderService.wait-duration=1s
resilience4j.retry.instances.orderService.enable-exponential-backoff=true
resilience4j.retry.instances.orderService.exponential-backoff-multiplier=2

# Retry cho userService
resilience4j.retry.instances.userService.max-attempts=3
resilience4j.retry.instances.userService.wait-duration=1s
resilience4j.retry.instances.userService.enable-exponential-backoff=true
resilience4j.retry.instances.userService.exponential-backoff-multiplier=2

# Retry cho foodService
resilience4j.retry.instances.foodService.max-attempts=3
resilience4j.retry.instances.foodService.wait-duration=1s
resilience4j.retry.instances.foodService.enable-exponential-backoff=true
resilience4j.retry.instances.foodService.exponential-backoff-multiplier=2

# --- Rate Limiter ---
# Rate limiter cho orderService
resilience4j.ratelimiter.instances.orderService.limit-for-period=20
resilience4j.ratelimiter.instances.orderService.limit-refresh-period=1s
resilience4j.ratelimiter.instances.orderService.timeout-duration=5s

# --- Actuator: expose resilience4j health indicators ---
management.endpoints.web.exposure.include=health,circuitbreakers,circuitbreakerevents,ratelimiters,retries
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
